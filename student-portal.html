<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCU Student Portal</title>
    <link rel="icon" type="image/png" href="images/pcu-logo.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/portal.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="portal-page">
    <div class="portal-page-header">
        <div class="portal-page-header__inner">
            <a href="home.html" class="portal-page-header__back">&larr; Back</a>
            <div class="portal-page-header__logo">&#x1F393;</div>
            <h1 class="portal-page-header__title">Student Portal</h1>
            <div class="portal-page-header__actions">
                <span class="portal-page-header__user" id="portal-header-user"></span>
                <button class="portal-logout-btn" id="portal-logout-btn" style="display:none;">Logout</button>
            </div>
        </div>
    </div>
    <div class="portal-page-body" id="portal-body"></div>
    <footer class="site-footer">
        <div class="site-footer__inner">
            <div class="site-footer__col">
                <p class="site-footer__uni">Philippine Christian University</p>
                <p class="site-footer__addr">1648 Taft Avenue, Malate, Manila, Philippines 1004</p>
            </div>
            <div class="site-footer__col site-footer__col--center">
                <p class="site-footer__tagline">Faith &middot; Excellence &middot; Service</p>
            </div>
            <div class="site-footer__col site-footer__col--right">
                <p class="site-footer__copy">&copy; 2026 PCU Faculty Consultation System</p>
            </div>
        </div>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="js/data.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/portal.js"></script>
    <script>
    (function() {
        'use strict';
        var PCU = window.PCU;

        function showLogin() {
            document.getElementById('portal-body').innerHTML =
                '<div class="portal-login">' +
                    '<div class="portal-login__icon">&#x1F393;</div>' +
                    '<h2 class="portal-login__title">Student Portal</h2>' +
                    '<p class="portal-login__subtitle">Please log in first.</p>' +
                    '<a href="home.html" class="portal-login__submit" style="text-decoration:none;text-align:center;display:block;">Go to Login</a>' +
                '</div>';
        }

        async function init() {
            // Always try to init database
            try {
                await PCU.initDatabase();
            } catch(e) {
                console.warn('DB init error:', e);
            }

            // Check session from SQLite first, then localStorage fallback
            var user = null;

            // Try SQLite session
            var sessionId = localStorage.getItem('pcu_session_id');
            if (sessionId && PCU.dbReady && PCU.db) {
                var session = PCU.dbGetSession(sessionId);
                if (session) {
                    user = PCU.dbGetUserByUserId(session.user_id);
                }
            }

            // Fallback to localStorage
            if (!user) {
                var saved = localStorage.getItem('pcu_current_user');
                if (saved) {
                    try {
                        var parsed = JSON.parse(saved);
                        if (PCU.dbReady && PCU.db) {
                            user = PCU.dbGetUserByUserId(parsed.user_id);
                        } else {
                            user = parsed;
                        }
                    } catch(e) {}
                }
            }

            if (!user || user.role !== 'student') {
                showLogin();
                return;
            }

            PCU.currentUser = {
                id: user.id, user_id: user.user_id, name: user.name,
                email: user.email, role: user.role, status: user.status,
                department: user.department || '', specialization: user.specialization || '',
                course: user.course || '',
                initials: user.name.split(' ').map(function(n){return n[0];}).join('').substr(0,2).toUpperCase()
            };

            PCU.autoLoginStudent();
            PCU.renderPortal();

            document.getElementById('portal-logout-btn').addEventListener('click', function() {
                PCU.logout();
                window.location.href = 'home.html';
            });
        }

        init();
    })();
    </script>
</body>
</html>
