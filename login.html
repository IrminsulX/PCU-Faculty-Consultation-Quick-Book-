<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCU Quick-Book | Sign In</title>
    <link rel="icon" type="image/png" href="images/pcu-logo.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-particles">
        <div class="auth-particle"></div>
        <div class="auth-particle"></div>
        <div class="auth-particle"></div>
        <div class="auth-particle"></div>
        <div class="auth-particle"></div>
        <div class="auth-particle"></div>
        <div class="auth-particle"></div>
        <div class="auth-particle"></div>
    </div>
    <div class="auth-split" id="auth-split">
        <!-- Filled by auth.js -->
    </div>

    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
    (function() {
        'use strict';
        var PCU = window.PCU;

        // If already logged in, redirect to home
        async function checkAndRedirect() {
            var sessionId = localStorage.getItem('pcu_session_id');
            if (sessionId) {
                try {
                    var result = await PCU.apiCheckSession(sessionId);
                    if (result.valid) {
                        PCU.currentUser = result.user;
                        window.location.href = 'home.html';
                        return;
                    }
                } catch (e) {}
            }
            // Not logged in — render the auth forms
            PCU.renderAuthPage();
        }

        checkAndRedirect();
    })();
    </script>
</body>
</html>
