<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCU Faculty Portal</title>
    <link rel="icon" type="image/png" href="images/pcu-logo.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/portal.css">
    <link rel="stylesheet" href="css/faculty-portal.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="portal-page">
    <div class="portal-page-header portal-page-header--faculty">
        <div class="portal-page-header__inner">
            <a href="home.html" class="portal-page-header__back">&larr; Back</a>
            <div class="portal-page-header__logo"><img src="images/pcu-logo.png" alt="PCU" style="width:100%;height:100%;object-fit:contain;border-radius:50%;"></div>
            <h1 class="portal-page-header__title">Faculty Portal</h1>
            <div class="portal-page-header__actions">
                <span class="portal-page-header__user" id="faculty-portal-header-user"></span>
                <button class="portal-logout-btn" id="faculty-portal-logout-btn" style="display:none;">Logout</button>
            </div>
        </div>
    </div>
    <div class="portal-page-body" id="faculty-portal-body"></div>
    <footer class="site-footer">
        <div class="site-footer__inner">
            <div class="site-footer__col">
                <p class="site-footer__uni">Philippine Christian University</p>
                <p class="site-footer__addr">1648 Taft Avenue, Malate, Manila, Philippines 1004</p>
            </div>
            <div class="site-footer__col site-footer__col--center">
                <p class="site-footer__tagline">Faith &middot; Character &middot; Service</p>
            </div>
            <div class="site-footer__col site-footer__col--right">
                <p class="site-footer__copy">&copy; 2026 PCU Faculty Consultation System</p>
            </div>
        </div>
    </footer>
    <script src="js/data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/faculty-portal.js"></script>
    <script>
    (function() {
        'use strict';
        var PCU = window.PCU;

        function showLogin() {
            document.getElementById('faculty-portal-body').innerHTML =
                '<div class="portal-login">' +
                    '<div class="portal-login__icon"><img src="images/pcu-logo.png" alt="PCU" style="width:60px;height:60px;object-fit:contain;"></div>' +
                    '<h2 class="portal-login__title">Faculty Portal</h2>' +
                    '<p class="portal-login__subtitle">Please log in first.</p>' +
                    '<a href="login.html" class="portal-login__submit" style="text-decoration:none;text-align:center;display:block;">Go to Login</a>' +
                '</div>';
        }

        async function init() {
            PCU.loadState();
            try { await PCU.initDatabase(); } catch(e) {}

            var sessionId = localStorage.getItem('pcu_session_id');
            if (!sessionId) {
                showLogin();
                return;
            }

            var result = await PCU.apiCheckSession(sessionId);
            if (!result.valid || result.user.role !== 'faculty') {
                showLogin();
                return;
            }

            PCU.currentUser = result.user;
            PCU.currentFaculty = {
                id: result.user.id, faculty_id: result.user.user_id, name: result.user.name,
                email: result.user.email, department: result.user.department || '',
                specialization: result.user.specialization || '',
                initials: result.user.initials
            };

            PCU.renderFacultyPortal();

            document.getElementById('faculty-portal-logout-btn').addEventListener('click', function() {
                PCU.logout();
                window.location.href = 'login.html';
            });
        }

        init();
    })();
    </script>
</body>
</html>
