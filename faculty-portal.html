<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCU Faculty Portal</title>
    <link rel="icon" type="image/png" href="images/pcu-logo.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/portal.css">
    <link rel="stylesheet" href="css/faculty-portal.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="portal-page">
    <!-- ========== PORTAL HEADER ========== -->
    <div class="portal-page-header portal-page-header--faculty">
        <div class="portal-page-header__inner">
            <a href="home.html" class="portal-page-header__back">&larr; Back</a>
            <div class="portal-page-header__logo">&#x1F468;&#x200D;&#x1F3EB;</div>
            <h1 class="portal-page-header__title">Faculty Portal</h1>
            <div class="portal-page-header__actions">
                <span class="portal-page-header__user" id="faculty-portal-header-user"></span>
                <button class="portal-logout-btn" id="faculty-portal-logout-btn" style="display:none;">Logout</button>
            </div>
        </div>
    </div>

    <!-- ========== PORTAL BODY ========== -->
    <div class="portal-page-body" id="faculty-portal-body">
        <!-- Filled by faculty-portal.js -->
    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="site-footer">
        <div class="site-footer__inner">
            <div class="site-footer__col">
                <p class="site-footer__uni">Philippine Christian University</p>
                <p class="site-footer__addr">1648 Taft Avenue, Malate, Manila, Philippines 1004</p>
            </div>
            <div class="site-footer__col site-footer__col--center">
                <p class="site-footer__tagline">Faith &middot; Excellence &middot; Service</p>
            </div>
            <div class="site-footer__col site-footer__col--right">
                <p class="site-footer__copy">&copy; 2026 PCU Faculty Consultation System</p>
            </div>
        </div>
    </footer>

    <!-- ========== SCRIPTS ========== -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/faculty-portal.js"></script>
    <script>
    (function() {
        'use strict';
        var PCU = window.PCU;

        var saved = localStorage.getItem('pcu_current_user');
        if (!saved) {
            document.getElementById('faculty-portal-body').innerHTML = '<div class="portal-login"><div class="portal-login__icon">&#x1F468;&#x200D;&#x1F3EB;</div><h2 class="portal-login__title">Faculty Portal</h2><p class="portal-login__subtitle">Please log in first to access the Faculty Portal.</p><a href="home.html" class="portal-login__submit" style="text-decoration:none;text-align:center;display:block;">Go to Login</a></div>';
            return;
        }

        try {
            PCU.currentUser = JSON.parse(saved);
            if (PCU.currentUser.role !== 'faculty') {
                document.getElementById('faculty-portal-body').innerHTML = '<div class="portal-login"><div class="portal-login__icon">&#x1F468;&#x200D;&#x1F3EB;</div><h2 class="portal-login__title">Faculty Portal</h2><p class="portal-login__subtitle">Please log in as faculty to access this portal.</p><a href="home.html" class="portal-login__submit" style="text-decoration:none;text-align:center;display:block;">Go to Login</a></div>';
                return;
            }
        } catch(e) {
            document.getElementById('faculty-portal-body').innerHTML = '<div class="portal-login"><div class="portal-login__icon">&#x1F468;&#x200D;&#x1F3EB;</div><h2 class="portal-login__title">Faculty Portal</h2><p class="portal-login__subtitle">Please log in first to access the Faculty Portal.</p><a href="home.html" class="portal-login__submit" style="text-decoration:none;text-align:center;display:block;">Go to Login</a></div>';
            return;
        }

        PCU.currentFaculty = {
            id: null,
            faculty_id: PCU.currentUser.user_id,
            name: PCU.currentUser.name,
            email: PCU.currentUser.email,
            department: PCU.currentUser.department || '',
            specialization: PCU.currentUser.specialization || '',
            initials: PCU.currentUser.name.split(' ').map(function(n) { return n[0]; }).join('').substr(0, 2).toUpperCase()
        };

        PCU.renderFacultyPortal();

        document.getElementById('faculty-portal-logout-btn').addEventListener('click', function() {
            localStorage.removeItem('pcu_current_user');
            window.location.href = 'home.html';
        });
    })();
    </script>
</body>
</html>
